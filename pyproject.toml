[tool.ruff]
target-version = "py312"
line-length = 100
src = ["backend", "ingestion", "tools"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "ANN", # flake8-annotations (type hints)
]
ignore = [
    "ANN101", # missing self annotation
    "ANN102", # missing cls annotation
    "S101",   # assert — used in tests
]

[tool.ruff.lint.per-file-ignores]
"tools/*" = ["S", "ANN"]
"*/tests/*" = ["S", "ANN"]
"alembic/*" = ["ANN"]

[tool.ruff.lint.isort]
known-first-party = ["app", "ingestion"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
