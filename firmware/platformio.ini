; batmonai ESP32 firmware
; Board: ESP32-WROOM-32U (generic esp32dev)
; Flash with: pio run -t upload
; Monitor with: pio device monitor

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

build_unflags =
    -std=gnu++11
