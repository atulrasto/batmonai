# batmonai Mosquitto — dev configuration
# Per-listener settings so TLS requires auth; plain listener is open for dev tooling.

per_listener_settings true

# ── TLS listener (all environments) ──────────────────────────────────────────
listener 8883
protocol mqtt
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key
tls_version tlsv1.2
require_certificate false
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file      /mosquitto/config/acl

# ── Plain listener (dev / LAN only) ──────────────────────────────────────────
# No auth — useful for firmware bench-testing and healthchecks.
# NOT exposed in prod (docker-compose.prod.yml removes the port mapping).
listener 1883
protocol mqtt
allow_anonymous true

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
